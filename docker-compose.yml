services:
  postgres:
    image: postgres:16-alpine
    container_name: sgconfi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sgconfi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido}
      POSTGRES_DB: ${POSTGRES_DB:-sgconfi}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # pgAdmin solo para desarrollo local — NO incluir en producción
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sgconfi_pgadmin
    restart: unless-stopped
    profiles:
      - dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@sgconfi.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD no definido}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
