services:
  postgres:
    image: postgres:16-alpine
    container_name: sgconfi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sgconfi
      POSTGRES_PASSWORD: sgconfi123
      POSTGRES_DB: sgconfi
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sgconfi_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sgconfi.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
